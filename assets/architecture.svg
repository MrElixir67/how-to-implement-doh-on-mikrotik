<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="monospace">
  <rect width="900" height="520" fill="#0d1117"/>

  <!-- Background: Main Network -->
  <!-- Internet -->
  <rect x="580" y="30" width="280" height="140" rx="12" fill="#161b22" stroke="#30363d" stroke-width="2"/>
  <text x="720" y="58" fill="#58a6ff" font-size="16" font-weight="bold">Internet (DNS Resolver)</text>

  <!-- Cloudflare DNS -->
  <rect x="610" y="80" width="220" height="70" rx="8" fill="#1c2128" stroke="#f0883e"/>
  <text x="720" y="105" fill="#f0883e" font-size="14" text-anchor="middle" font-weight="bold">Cloudflare DNS</text>
  <text x="720" y="125" fill="#8b949e" font-size="13" text-anchor="middle">1.1.1.1 / 1.0.0.1</text>
  <text x="720" y="142" fill="#8b949e" font-size="11" text-anchor="middle">DNS over HTTPS (DoH)</text>

  <!-- Arrow Cloudflare → MikroTik -->
  <line x1="610" y1="115" x2="520" y2="115" stroke="#30363d" stroke-width="2"/>
  <polygon points="525,110 515,115 525,120" fill="#30363d"/>
  <text x="565" y="108" fill="#8b949e" font-size="11" text-anchor="middle">HTTPS</text>

  <!-- Big Box: MikroTik -->
  <rect x="30" y="20" width="480" height="200" rx="12" fill="#161b22" stroke="#30363d" stroke-width="2"/>
  <text x="50" y="48" fill="#58a6ff" font-size="16" font-weight="bold">MikroTik Router (RouterOS 7+)</text>

  <!-- DoH Config Box -->
  <rect x="50" y="65" width="440" height="135" rx="8" fill="#1c2128" stroke="#30363d"/>
  <text x="270" y="88" fill="#c9d1d9" font-size="13" text-anchor="middle" font-weight="bold">DoH Configuration</text>

  <text x="70" y="110" fill="#8b949e" font-size="12">/ip/dns set</text>
  <text x="70" y="128" fill="#c9d1d9" font-size="12">  use-doh-server=</text>
  <text x="70" y="144" fill="#3fb950" font-size="12">    https://cloudflare-dns.com/dns-query</text>
  <text x="70" y="162" fill="#c9d1d9" font-size="12">  verify-doh-cert=no</text>
  <text x="70" y="180" fill="#c9d1d9" font-size="12">  allow-remote-requests=yes</text>
  <text x="70" y="196" fill="#c9d1d9" font-size="12">  servers=1.1.1.1,8.8.8.8</text>

  <!-- Arrow down from MikroTik to LAN -->
  <line x1="270" y1="220" x2="270" y2="260" stroke="#30363d" stroke-width="2"/>
  <polygon points="265,255 270,265 275,255" fill="#30363d"/>
  <text x="320" y="245" fill="#8b949e" font-size="11">DHCP → DNS</text>

  <!-- LAN Clients Box -->
  <rect x="30" y="270" width="480" height="120" rx="12" fill="#161b22" stroke="#30363d" stroke-width="2"/>
  <text x="50" y="298" fill="#58a6ff" font-size="16" font-weight="bold">Local Network (LAN)</text>

  <!-- Client 1 -->
  <rect x="50" y="315" width="130" height="55" rx="6" fill="#1c2128" stroke="#30363d"/>
  <text x="115" y="338" fill="#c9d1d9" font-size="13" text-anchor="middle">💻 Laptop</text>
  <text x="115" y="358" fill="#8b949e" font-size="11" text-anchor="middle">DHCP → auto DNS</text>

  <!-- Client 2 -->
  <rect x="205" y="315" width="130" height="55" rx="6" fill="#1c2128" stroke="#30363d"/>
  <text x="270" y="338" fill="#c9d1d9" font-size="13" text-anchor="middle">📱 Smartphone</text>
  <text x="270" y="358" fill="#8b949e" font-size="11" text-anchor="middle">DHCP → auto DNS</text>

  <!-- Client 3 -->
  <rect x="360" y="315" width="130" height="55" rx="6" fill="#1c2128" stroke="#30363d"/>
  <text x="425" y="338" fill="#c9d1d9" font-size="13" text-anchor="middle">🖥️ PC</text>
  <text x="425" y="358" fill="#8b949e" font-size="11" text-anchor="middle">DHCP → auto DNS</text>

  <!-- Flow labels -->
  <text x="270" y="405" fill="#3fb950" font-size="12" text-anchor="middle">✅ All DNS queries encrypted via DoH</text>
  <text x="270" y="420" fill="#8b949e" font-size="11" text-anchor="middle">ISP cannot see what domains you visit</text>

  <!-- Legend -->
  <rect x="580" y="300" width="280" height="120" rx="8" fill="#1c2128" stroke="#30363d"/>
  <text x="595" y="325" fill="#c9d1d9" font-size="13" font-weight="bold">Legend</text>
  <rect x="595" y="335" width="12" height="12" fill="#f0883e"/>
  <text x="615" y="346" fill="#8b949e" font-size="11">External Service (Cloudflare)</text>
  <rect x="595" y="355" width="12" height="12" fill="#58a6ff"/>
  <text x="615" y="366" fill="#8b949e" font-size="11">Router / Server</text>
  <rect x="595" y="375" width="12" height="12" fill="#3fb950"/>
  <text x="615" y="386" fill="#8b949e" font-size="11">DoH Configuration</text>
  <rect x="595" y="395" width="12" height="12" fill="#30363d"/>
  <text x="615" y="406" fill="#8b949e" font-size="11">Local Network Devices</text>

  <!-- Flow number badges -->
  <circle cx="640" cy="200" r="12" fill="#1c2128" stroke="#f0883e"/>
  <text x="640" y="205" fill="#f0883e" font-size="12" text-anchor="middle" font-weight="bold">1</text>
  <text x="665" y="205" fill="#8b949e" font-size="11">DNS query goes to router</text>

  <circle cx="640" cy="225" r="12" fill="#1c2128" stroke="#3fb950"/>
  <text x="640" y="230" fill="#3fb950" font-size="12" text-anchor="middle" font-weight="bold">2</text>
  <text x="665" y="230" fill="#8b949e" font-size="11">Router forwards via DoH (HTTPS)</text>

  <circle cx="640" cy="250" r="12" fill="#1c2128" stroke="#f0883e"/>
  <text x="640" y="255" fill="#f0883e" font-size="12" text-anchor="middle" font-weight="bold">3</text>
  <text x="665" y="255" fill="#8b949e" font-size="11">Cloudflare resolves → returns IP</text>

  <circle cx="640" cy="275" r="12" fill="#1c2128" stroke="#3fb950"/>
  <text x="640" y="280" fill="#3fb950" font-size="12" text-anchor="middle" font-weight="bold">4</text>
  <text x="665" y="280" fill="#8b949e" font-size="11">Client gets IP → site loads 🔐</text>
</svg>
